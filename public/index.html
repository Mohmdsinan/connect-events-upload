<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Submission — Connect</title>
  <meta name="description" content="Submit your community event details to Connect. Fueled By Passion.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo-link" aria-label="Connect — Home">
        <img src="ConnectFullLogo.png" alt="Connect logo" class="logo-img">
      </a>
    </div>
  </header>

  <!-- ── Main content ── -->
  <main class="page-body">
    <div class="form-card">
      <!-- Card header -->
      <div class="card-header">
        <h1 class="form-title">Event Submission</h1>
        <p class="form-subtitle">Fill in the details below and we'll take it from here.</p>
      </div>

      <form id="eventForm" novalidate>

        <!-- Name -->
        <div class="field-group">
          <label for="name">Event Name <span class="required">*</span></label>
          <input type="text" id="name" name="name" placeholder="e.g. Hackathon" required>
        </div>

        <!-- Date -->
        <div class="field-group">
          <label for="date">Date <span class="required">*</span></label>
          <input type="date" id="date" name="date" required>
        </div>

        <!-- Venue -->
        <div class="field-group">
          <label for="venue">Venue <span class="required">*</span></label>
          <input type="text" id="venue" name="venue" placeholder="e.g. Connect Room" required>
        </div>

        <!-- Coordinator -->
        <div class="field-group">
          <label for="coordinator">Coordinator <span class="required">*</span></label>
          <input type="text" id="coordinator" name="coordinator" placeholder="Name of coordinator" required>
        </div>

        <!-- Description -->
        <div class="field-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="4" placeholder="Brief overview of the event, goals, and highlights…"></textarea>
        </div>

        <!-- Section divider -->
        <div class="section-divider">
          <span>Attachments</span>
        </div>

        <!-- Attendance PDF -->
        <div class="field-group">
          <label for="attendancePdf">Attendance PDF</label>
          <div class="drop-zone" id="zone-attendancePdf" data-target="attendancePdf" data-accept="PDF">
            <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
              <path d="M12 16V8m0 0-3 3m3-3 3 3" stroke-linecap="round" stroke-linejoin="round"/>
              <rect x="3" y="3" width="18" height="18" rx="4"/>
            </svg>
            <p class="drop-text">Drop PDF here or <span class="drop-browse">browse</span></p>
            <p class="drop-hint" id="hint-attendancePdf">PDF files only</p>
            <input type="file" id="attendancePdf" name="attendancePdf" accept="application/pdf" tabindex="-1">
          </div>
        </div>

        <!-- Photos -->
        <div class="field-group photos-row">
          <label>Event Photos <span class="required">*</span><span class="label-note">&nbsp;(Photo 1 &amp; 2 required)</span></label>
          <div class="photos-grid">

            <div class="drop-zone drop-zone--photo" id="zone-photo1" data-target="photo1" data-accept="Image">
              <svg class="drop-icon drop-icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="4"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="m21 15-5-5L5 21" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <p class="drop-text drop-text--sm">Photo 1 <span class="required">*</span></p>
              <p class="drop-hint" id="hint-photo1">No file chosen</p>
              <input type="file" id="photo1" name="photo1" accept="image/*" tabindex="-1" required>
            </div>

            <div class="drop-zone drop-zone--photo" id="zone-photo2" data-target="photo2" data-accept="Image">
              <svg class="drop-icon drop-icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="4"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="m21 15-5-5L5 21" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <p class="drop-text drop-text--sm">Photo 2 <span class="required">*</span></p>
              <p class="drop-hint" id="hint-photo2">No file chosen</p>
              <input type="file" id="photo2" name="photo2" accept="image/*" tabindex="-1" required>
            </div>

            <div class="drop-zone drop-zone--photo" id="zone-photo3" data-target="photo3" data-accept="Image">
              <svg class="drop-icon drop-icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="4"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="m21 15-5-5L5 21" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <p class="drop-text drop-text--sm">Photo 3</p>
              <p class="drop-hint" id="hint-photo3">No file chosen</p>
              <input type="file" id="photo3" name="photo3" accept="image/*" tabindex="-1">
            </div>

          </div>
        </div>

        <!-- Photos Link -->
        <div class="field-group">
          <label for="photosLink">Photos Link</label>
          <input type="url" id="photosLink" name="photosLink" placeholder="https://drive.google.com/…">
        </div>

        <!-- Fund Details PDF -->
        <div class="field-group">
          <label for="fundDetails">Fund Details</label>
          <div class="drop-zone" id="zone-fundDetails" data-target="fundDetails" data-accept="PDF">
            <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
              <path d="M12 16V8m0 0-3 3m3-3 3 3" stroke-linecap="round" stroke-linejoin="round"/>
              <rect x="3" y="3" width="18" height="18" rx="4"/>
            </svg>
            <p class="drop-text">Drop PDF here or <span class="drop-browse">browse</span></p>
            <p class="drop-hint" id="hint-fundDetails">PDF files only</p>
            <input type="file" id="fundDetails" name="fundDetails" accept="application/pdf" tabindex="-1">
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" id="submitBtn" class="submit-btn">
          <span class="btn-label">Submit Event</span>
          <svg class="btn-arrow" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 0 1 1.414 0l6 6a1 1 0 0 1 0 1.414l-6 6a1 1 0 0 1-1.414-1.414L14.586 11H3a1 1 0 1 1 0-2h11.586l-4.293-4.293a1 1 0 0 1 0-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>

        <!-- Status message -->
        <p id="statusMsg" role="status" aria-live="polite"></p>

      </form>
    </div>
  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <p class="footer-tagline">Fueled By Passion</p>
    <p class="footer-copy">&copy; <span id="footerYear"></span> Connect. All rights reserved.</p>
  </footer>

  <!-- Single script reference — all JS lives in script.js -->
  <script src="script.js"></script>
</body>
</html>
